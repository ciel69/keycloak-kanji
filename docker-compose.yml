version: "3.9"

services:
  keycloak:  # <-- ПЕРВЫМ должен идти сервис, который должен быть доступен по домену
    build: .
    container_name: keycloak
    restart: always
    environment:
        KC_DB: postgres
        KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
        KC_DB_USERNAME: keycloak
        KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
        KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
        KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}

        # Главное исправление: простой hostname для локального запуска
        #KC_HOSTNAME: localhost
        KC_HOSTNAME_PORT: 8080
        KC_HTTP_ENABLED: true

        # Эти переменные для локального запуска не нужны, убираем их
        KC_HOSTNAME_URL: https://${KEYCLOAK_HOSTNAME}
        KC_HOSTNAME_ADMIN_URL: https://${KEYCLOAK_HOSTNAME}
        KC_PROXY: edge
        KC_PROXY_HEADERS: xforwarded
        KC_HOSTNAME_STRICT: false
        KC_HOSTNAME_STRICT_BACKCHANNEL: false
    command: start
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    container_name: kc_postgres
    restart: always
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 5s
      timeout: 5s
      retries: 10
    # У postgres НЕ должно быть ports, если не нужен прямой доступ
